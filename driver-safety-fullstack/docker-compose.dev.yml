version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  Dev override — starts only postgres + redis in Docker,
#  lets you run frontend + backend natively for hot-reload.
#
#  Usage:
#    docker compose -f docker-compose.dev.yml up -d
#    npm run frontend   (in one terminal)
#    npm run backend    (in another terminal)
# ─────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: dsai_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER:     dsai
      POSTGRES_PASSWORD: dsai
      POSTGRES_DB:       dsai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dsai_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
