version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  Driver Safety AI — Full Stack
#  Run: docker compose up --build
#
#  Services
#  ├── postgres   postgresql:5432
#  ├── redis      redis:6379
#  ├── api        FastAPI   → http://localhost:8000
#  ├── worker     Celery worker
#  ├── beat       Celery scheduler
#  └── frontend   Next.js   → http://localhost:3000
# ─────────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  DATABASE_URL:        postgresql+asyncpg://dsai:dsai@postgres:5432/dsai_db
  SYNC_DATABASE_URL:   postgresql://dsai:dsai@postgres:5432/dsai_db
  REDIS_URL:           redis://redis:6379/0
  CELERY_BROKER_URL:   redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  ALLOWED_ORIGINS:     http://localhost:3000
  SECRET_KEY:          dev-secret-change-in-production-64chars!!dev-secret-change-in-prod
  ENVIRONMENT:         development
  DEBUG:               "true"

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dsai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     dsai
      POSTGRES_PASSWORD: dsai
      POSTGRES_DB:       dsai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsai -d dsai_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dsai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FastAPI backend ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsai_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app        # hot-reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery worker ────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsai_worker
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.worker worker --loglevel=info --concurrency=2

  # ── Celery beat scheduler ────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsai_beat
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.worker beat --loglevel=info

  # ── Next.js frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dsai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1/ws
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
